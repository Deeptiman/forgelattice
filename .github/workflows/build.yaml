name: Go Crypto CI

on:
  push:
    branches: [ main, dev-go-version ]
  pull_request:
    branches: [ main, dev-go-version ]

jobs:
  test:
    runs-on: ubuntu-24.04-arm

    defaults:
      run:
        working-directory: go/src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Test Kyber Key Generation, Encapsulation, Decapsulation
        run: go test -count=1 -v -race -cover ./kem/...

      - name: Test SHA3
        run: go test -count=1 -v -race -cover ./sha3/...

      - name: Test Dilithium Signature & Verify
        run: go test -count=1 -v -race -cover ./sign/...

  lint:
    runs-on: ubuntu-24.04-arm
    if: github.event_name == 'pull_request'   # only on PRs

    defaults:
      run:
        working-directory: go/src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run lint
        run: golangci-lint run ./...