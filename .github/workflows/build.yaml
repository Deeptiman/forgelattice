name: ForgeLattice

on:
  push:
    branches:
      - main
      - dev-go-version
  pull_request:
    branches:
      - main
      - dev-go-version

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  KEM-Test:
    runs-on: ubuntu-24.04-arm

    defaults:
      run:
        working-directory: crypto

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af2d1  # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32  # v5.4.0
        with:
          go-version: '1.26'
          cache: true

      - name: Kyber Key Generation, Encapsulation, Decapsulation
        run: go test -count=1 -v -race -cover ./kem/...

  SHA3-Test:
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: crypto

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af2d1  # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32  # v5.4.0
        with:
          go-version: '1.26'
          cache: true

      - name: SHA3 [SHAKE128, SHAKE256]
        run: go test -count=1 -v -race -cover ./sha3/...

  SIGN-AND-VERIFY-Test:
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: crypto

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af2d1  # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32  # v5.4.0
        with:
          go-version: '1.26'
          cache: true

      - name: Dilithium Signature Generation & Verify
        run: go test -count=1 -v -race -cover ./dsa/...

  Code-Lint:
    runs-on: ubuntu-24.04-arm
    if: github.event_name == 'pull_request'

    defaults:
      run:
        working-directory: crypto

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af2d1  # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32  # v5.4.0
        with:
          go-version: '1.26'

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run lint
        run: golangci-lint run ./...