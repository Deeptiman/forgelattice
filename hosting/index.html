<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>forgekey.systems</title>

    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            color: #000000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            /* Light dotted pattern */
            background-image:
                    radial-gradient(rgba(0,0,0,0.08) 1px, transparent 1px),
                    radial-gradient(rgba(0,0,0,0.04) 1px, transparent 1px);
            background-size: 40px 40px, 80px 80px;
            background-position: 0 0, 20px 20px;
        }

        .quote-container {
            max-width: 850px;
            padding: 20px;
            text-align: center;
        }

        .quote {
            font-size: 28px;
            font-weight: 300;
            font-style: italic;
            line-height: 1.4;
            color: #000000;
        }

        .author {
            margin-top: 15px;
            font-size: 20px;
            font-weight: 400;
            color: #333333;
            font-style: italic;
        }
    </style>
</head>

<body>
<div class="quote-container">
    <div class="quote">
        “256-bit AES keys should be used in order to achieve a 128-bit security level against quantum attacks.”
    </div>
    <div class="author">— Alfred Menezes</div>
</div>
</body>
</html>
