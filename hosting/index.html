<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>ForgeKey Systems</title>
    <style>
        body {
            background-color: white;
            margin: 0;
            padding: 0;
            font-family: "Roboto Thin", serif;
            color: #000;

            /* KEY BACKGROUND PATTERN */
            background-image: radial-gradient(#00000022 1px, transparent 1px),
            repeating-linear-gradient(0deg, transparent, transparent 20px, #00000005 20px, #00000005 21px);
        }

        /* Replace dots with key icon layer */
        body::before {
            content: "🗝";
            font-size: 12px;
            opacity: 0.08;   /* VERY faint */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            /* Tile the key icon */
            background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40'><text x='0' y='32' font-size='32'>🗝</text></svg>");
            background-repeat: repeat;
            background-size: 40px 40px;
            z-index: -1;
        }

        .quote-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .quote {
            font-size: 26px;
            font-style: italic;
            max-width: 800px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
<div class="quote-wrapper">
    <div class="quote">
        “256-bit AES keys should be used in order to achieve a 128-bit security level against quantum attacks.” – Alfred Menezes
    </div>
</div>
</body>
</html>
